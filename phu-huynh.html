<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kết quả học tập — CodeLab</title>
  <style>
    :root {
      --bg:#0a0e1a; --surface:#111827; --surface2:#1a2235; --surface3:#232d42;
      --border:#2a3550; --text:#e8eaf6; --text2:#94a3b8; --text3:#64748b;
      --accent:#4f9eff; --accent2:#34d399; --warn:#fbbf24; --error:#f87171;
      --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:var(--sans);
           min-height:100vh; display:flex; flex-direction:column; }

    /* Header */
    .header { background:var(--surface); border-bottom:1px solid var(--border);
               padding:16px 20px; display:flex; align-items:center; gap:12px; }
    .header-logo { font-size:22px; font-weight:900; color:var(--accent); }
    .header-sub  { font-size:13px; color:var(--text3); }

    /* Main */
    .main { flex:1; padding:24px 16px; max-width:600px; margin:0 auto; width:100%; }

    /* Login form */
    .login-card { background:var(--surface); border:1px solid var(--border);
                  border-radius:16px; padding:28px; margin-top:20px; }
    .login-title { font-size:18px; font-weight:800; margin-bottom:6px; }
    .login-sub   { font-size:13px; color:var(--text3); margin-bottom:20px; }
    .form-group  { margin-bottom:16px; }
    .form-label  { font-size:12px; font-weight:700; color:var(--text2);
                   text-transform:uppercase; letter-spacing:.5px; display:block; margin-bottom:6px; }
    .form-input  { width:100%; padding:11px 14px; background:var(--surface2);
                   border:1px solid var(--border); border-radius:10px; color:var(--text);
                   font-size:14px; outline:none; transition:border .15s; }
    .form-input:focus { border-color:var(--accent); }
    .btn-primary { width:100%; padding:13px; font-size:14px; font-weight:700;
                   background:linear-gradient(135deg,#4f9eff,#3b82f6);
                   border:none; border-radius:10px; color:#fff; cursor:pointer; }
    .btn-primary:hover { opacity:.9; }
    .error-msg { background:rgba(248,113,113,.1); border:1px solid rgba(248,113,113,.3);
                  border-radius:8px; padding:10px 14px; font-size:13px; color:var(--error);
                  margin-top:12px; display:none; }

    /* Report */
    .report { display:none; }
    .profile-card { background:var(--surface); border:1px solid var(--border);
                    border-radius:16px; padding:20px; margin-bottom:16px;
                    display:flex; align-items:center; gap:16px; }
    .avatar { width:56px; height:56px; border-radius:50%; flex-shrink:0;
               background:linear-gradient(135deg,#4f9eff,#34d399);
               display:flex; align-items:center; justify-content:center;
               font-size:22px; font-weight:800; color:#fff; }
    .profile-name { font-size:18px; font-weight:800; }
    .profile-meta { font-size:13px; color:var(--text3); margin-top:3px; }

    .stats-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
    .stat-card { background:var(--surface); border:1px solid var(--border);
                 border-radius:12px; padding:14px; text-align:center; }
    .stat-val  { font-size:28px; font-weight:900; color:var(--accent); }
    .stat-lbl  { font-size:11.5px; color:var(--text3); margin-top:4px; }

    .section-title { font-size:13px; font-weight:800; color:var(--text3);
                     text-transform:uppercase; letter-spacing:.5px; margin:16px 0 8px; }
    .exam-list { display:flex; flex-direction:column; gap:8px; }
    .exam-card { background:var(--surface); border:1px solid var(--border);
                 border-radius:10px; padding:12px 16px; display:flex;
                 align-items:center; justify-content:space-between; gap:10px; }
    .exam-name { font-size:13.5px; font-weight:600; flex:1; min-width:0;
                  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .exam-meta { font-size:11px; color:var(--text3); margin-top:2px; }
    .exam-score{ font-size:22px; font-weight:900; flex-shrink:0; }
    .score-high { color:var(--accent2); }
    .score-mid  { color:var(--warn); }
    .score-low  { color:var(--error); }

    .empty { text-align:center; padding:32px; color:var(--text3); font-size:14px; }
    .footer { text-align:center; padding:20px; font-size:12px; color:var(--text3); }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">📚 CodeLab</div>
  <div class="header-sub">Xem kết quả học tập của con</div>
</div>

<div class="main">
  <!-- Login form -->
  <div class="login-card" id="login-section">
    <div class="login-title">👨‍👩‍👧 Kết quả học tập</div>
    <div class="login-sub">Nhập mã số học sinh (MSHS/CCCD) để xem điểm</div>
    <div class="form-group">
      <label class="form-label" for="mshs-input">Mã số học sinh</label>
      <input class="form-input" id="mshs-input" type="text"
        placeholder="Nhập MSHS hoặc CCCD..." autocomplete="off"
        onkeydown="if(event.key==='Enter') lookup()">
    </div>
    <button class="btn-primary" onclick="lookup()">🔍 Xem kết quả</button>
    <div class="error-msg" id="err-msg"></div>
  </div>

  <!-- Report -->
  <div class="report" id="report-section">
    <div class="profile-card">
      <div class="avatar" id="rpt-avatar">?</div>
      <div>
        <div class="profile-name" id="rpt-name">—</div>
        <div class="profile-meta" id="rpt-meta">—</div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val" id="rpt-exam-avg">—</div>
        <div class="stat-lbl">ĐTB Kiểm tra</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="rpt-practice-avg">—</div>
        <div class="stat-lbl">ĐTB Luyện tập</div>
      </div>
    </div>

    <div class="section-title">Kết quả các bài kiểm tra</div>
    <div class="exam-list" id="rpt-exams"></div>

    <button class="btn-primary" style="margin-top:20px;background:var(--surface2);color:var(--text2);border:1px solid var(--border)"
      onclick="backToLogin()">← Xem học sinh khác</button>
  </div>
</div>

<div class="footer">CodeLab · THPT Thủ Thiêm · Dữ liệu được cập nhật theo thời gian thực</div>

<script>
  // Get script URL from URL param: phu-huynh.html?url=https://...
  function _getUrl() {
    const p = new URLSearchParams(location.search);
    return p.get('url') || localStorage.getItem('cl_script_url') || '';
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function lookup() {
    const mshs  = document.getElementById('mshs-input').value.trim();
    const err   = document.getElementById('err-msg');
    const url   = _getUrl();

    err.style.display = 'none';
    if (!mshs) { showErr('Vui lòng nhập MSHS'); return; }
    if (!url)  { showErr('Thiếu URL Apps Script. Thêm ?url=... vào địa chỉ.'); return; }

    document.querySelector('.btn-primary').textContent = '⏳ Đang tải...';
    try {
      const res  = await fetch(`${url}?action=getStudentReport&mshs=${encodeURIComponent(mshs)}`);
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'Không tìm thấy');
      showReport(data.data);
    } catch(e) {
      showErr(e.message);
    } finally {
      document.querySelector('.btn-primary').textContent = '🔍 Xem kết quả';
    }
  }

  function showErr(msg) {
    const err = document.getElementById('err-msg');
    err.textContent = msg; err.style.display = '';
  }

  function showReport(d) {
    const stu = d.student || {};
    document.getElementById('rpt-avatar').textContent = (stu.ho_ten||'?')[0].toUpperCase();
    document.getElementById('rpt-name').textContent   = stu.ho_ten || '—';
    document.getElementById('rpt-meta').textContent   =
      [stu.lop, stu.nam_hoc].filter(Boolean).join(' · ') || '—';

    const ea  = d.exam_avg;
    const pa  = d.practice_avg;
    const eaCls = ea>=8?'score-high':ea>=5?'score-mid':'score-low';
    const paCls = pa>=8?'score-high':pa>=5?'score-mid':'score-low';
    document.getElementById('rpt-exam-avg').innerHTML =
      ea !== null ? `<span class="${eaCls}">${(+ea).toFixed(2)}</span>` : '—';
    document.getElementById('rpt-practice-avg').innerHTML =
      pa !== null ? `<span class="${paCls}">${(+pa).toFixed(2)}</span>` : '—';

    const exams = (d.exams||[]).sort((a,b) => new Date(b.ts)-new Date(a.ts));
    const list  = document.getElementById('rpt-exams');
    if (!exams.length) {
      list.innerHTML = '<div class="empty">Chưa có bài kiểm tra nào.</div>';
    } else {
      list.innerHTML = exams.map(e => {
        const sc  = parseFloat(e.diem)||0;
        const cls = sc>=8?'score-high':sc>=5?'score-mid':'score-low';
        const date = e.ts ? new Date(e.ts).toLocaleDateString('vi-VN') : '';
        return `<div class="exam-card">
          <div>
            <div class="exam-name">${esc(e.ten_ky||e.ky_id)}</div>
            <div class="exam-meta">${e.da_hoan_thanh||0}/${e.so_bai||0} câu${date?' · '+date:''}</div>
          </div>
          <div class="exam-score ${cls}">${sc.toFixed(1)}</div>
        </div>`;
      }).join('');
    }

    document.getElementById('login-section').style.display  = 'none';
    document.getElementById('report-section').style.display = '';
  }

  function backToLogin() {
    document.getElementById('report-section').style.display = 'none';
    document.getElementById('login-section').style.display  = '';
    document.getElementById('mshs-input').value = '';
  }
</script>
</body>
</html>
